[profile.ci]
# CI should survive isolated scheduler flakes, while still reporting them as
# flaky in the final nextest summary.
fail-fast = false
failure-output = "immediate-final"
status-level = "retry"
final-status-level = "flaky"
retries = { count = 2, backoff = "fixed", delay = "1s" }
flaky-result = "pass"
slow-timeout = { period = "60s", terminate-after = 2 }
