<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        />
        <title>Iroh BLE Chat</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/src/styles.css" />
    </head>
    <body>
        <div class="app">
            <!-- Header -->
            <header class="app-header">
                <div class="header-left">
                    <div class="logo">⬡</div>
                    <div class="header-text">
                        <span class="app-title">Iroh BLE</span>
                        <span
                            id="connection-status"
                            class="status-pill starting"
                            >Starting...</span
                        >
                    </div>
                </div>
                <div id="bandwidth-indicator" class="bandwidth-indicator">
                    <div class="bw-row"><span class="bw-arrow bw-up">&#x2191;</span><span id="bw-tx">0</span> <span class="bw-unit">kbps</span></div>
                    <div class="bw-row"><span class="bw-arrow bw-down">&#x2193;</span><span id="bw-rx">0</span> <span class="bw-unit">kbps</span></div>
                    <div class="bw-row"><span class="bw-arrow">&#x21bb;</span><span id="bw-rtx">0</span> <span class="bw-unit">rtx</span></div>
                    <div class="bw-row"><span class="bw-arrow">&#x2702;</span><span id="bw-trunc">0</span> <span class="bw-unit">trunc</span></div>
                </div>
                <div class="header-actions">
                    <label class="debug-toggle" title="Show BLE/gossip debug events">
                        <input type="checkbox" id="debug-checkbox" checked />
                        <span class="debug-label">Debug</span>
                    </label>
                    <button
                        id="members-toggle-btn"
                        class="icon-btn members-toggle"
                        title="Members"
                    >
                        <span class="members-icon">⊞</span>
                        <span id="members-badge" class="badge" style="display:none">0</span>
                    </button>
                    <button
                        id="connect-toggle-btn"
                        class="icon-btn"
                        title="Add peer"
                    >
                        ＋
                    </button>
                </div>
            </header>

            <!-- My ID bar -->
            <div class="id-bar">
                <span class="id-label">My ID</span>
                <code id="my-id-display" class="id-value">Initializing...</code>
                <button class="copy-btn" id="copy-id-btn" title="Copy ID">
                    ⎘
                </button>
                <span class="id-divider"></span>
                <span id="nickname-display" class="nickname-value">—</span>
                <button class="copy-btn" id="edit-nickname-btn" title="Edit nickname">
                    ✎
                </button>
            </div>

            <!-- Nickname edit (inline, hidden by default) -->
            <div id="nickname-panel" class="nickname-panel collapsed">
                <div class="connect-inner">
                    <label class="input-label">Nickname</label>
                    <input
                        id="nickname-input"
                        placeholder="Enter nickname..."
                        autocomplete="off"
                    />
                    <button id="nickname-save-btn" class="primary-btn full-width">
                        Save
                    </button>
                </div>
            </div>

            <!-- Connect panel (collapsible) -->
            <div id="connect-panel" class="connect-panel collapsed">
                <div class="connect-inner">
                    <label class="input-label">Bootstrap Peer ID</label>
                    <textarea
                        id="peer-id-input"
                        placeholder="Paste peer's public key here..."
                        rows="2"
                        autocomplete="off"
                    ></textarea>
                    <button id="connect-btn" class="primary-btn full-width">
                        Add Peer
                    </button>
                    <div class="panel-divider"></div>
                    <button id="scan-qr-btn" class="primary-btn full-width qr-btn">
                        Scan QR Code
                    </button>
                    <button id="show-qr-btn" class="primary-btn full-width qr-btn">
                        Show My QR Code
                    </button>
                </div>
            </div>

            <!-- Main layout: chat + sidebar -->
            <div class="main-layout">
                <!-- Messages -->
                <main id="chat-messages" class="messages">
                    <div class="welcome">
                        <div class="welcome-icon">📡</div>
                        <p>Starting node…<br />This only takes a moment.</p>
                    </div>
                </main>

                <!-- Members sidebar (desktop: always visible; mobile: drawer) -->
                <aside id="members-sidebar" class="members-sidebar">
                    <div class="sidebar-header">
                        <span class="sidebar-title">Members</span>
                        <span id="members-count" class="sidebar-count">0</span>
                        <button id="sidebar-close-btn" class="sidebar-close">✕</button>
                    </div>
                    <div id="members-list" class="members-list">
                        <!-- Populated by JS -->
                    </div>
                    <div id="ble-peers-section" class="ble-peers-section" style="display:none">
                        <div class="ble-peers-header">BLE peers</div>
                        <div id="ble-peers-list" class="ble-peers-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </aside>
            </div>

            <!-- Drawer overlay (mobile only) -->
            <div id="drawer-overlay" class="drawer-overlay"></div>

            <!-- Input -->
            <div class="input-bar">
                <form id="msg-form">
                    <button
                        type="button"
                        id="attach-btn"
                        class="attach-btn"
                        title="Send image"
                        disabled
                    >
                        +
                    </button>
                    <input
                        id="msg-input"
                        placeholder="Message..."
                        autocomplete="off"
                        disabled
                    />
                    <button
                        type="submit"
                        id="send-btn"
                        class="send-btn"
                        disabled
                    >
                        ↑
                    </button>
                </form>
            </div>
        </div>

            <!-- QR code modal -->
            <div id="qr-modal" class="modal-overlay" style="display:none">
                <div class="modal-card">
                    <div class="modal-header">
                        <span class="modal-title">My QR Code</span>
                        <button id="qr-modal-close" class="modal-close">✕</button>
                    </div>
                    <div id="qr-container" class="qr-container"></div>
                    <div class="qr-id-label">
                        <code id="qr-id-text" class="qr-id-text"></code>
                    </div>
                </div>
            </div>

            <!-- Deep link confirmation dialog -->
            <div id="confirm-modal" class="modal-overlay" style="display:none">
                <div class="modal-card">
                    <div class="modal-header">
                        <span class="modal-title">Add Peer?</span>
                    </div>
                    <p class="confirm-text">
                        Add peer <code id="confirm-peer-id" class="confirm-peer-id"></code>?
                    </p>
                    <div class="confirm-actions">
                        <button id="confirm-cancel-btn" class="secondary-btn">Cancel</button>
                        <button id="confirm-add-btn" class="primary-btn">Add</button>
                    </div>
                </div>
            </div>

        <!-- Hidden start button (auto-triggered) -->
        <button id="start-node-btn" style="display: none"></button>

        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
