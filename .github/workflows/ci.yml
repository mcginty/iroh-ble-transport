name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  LINUX_APT_DEPS: libdbus-1-dev libglib2.0-dev pkg-config libgtk-3-dev libssl-dev libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libayatana-appindicator3-dev nasm

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: Swatinem/rust-cache@v2
      - run: mise run fmt:check

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  clippy:
    name: Clippy
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y $LINUX_APT_DEPS
      - run: mise run ci:lint

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y $LINUX_APT_DEPS
      - run: mise run test

  check-ios:
    name: Check (iOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise install --force rust
      - uses: Swatinem/rust-cache@v2
      - run: mise run ci:check-ios

  check-android:
    name: Check (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise install --force rust
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux system dependencies
        run: sudo apt-get update && sudo apt-get install -y $LINUX_APT_DEPS
      - run: mise run ci:check-android
