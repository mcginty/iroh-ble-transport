# iroh-ble-transport development tasks
# Install mise: https://mise.jdx.dev
# Usage: mise run <task>   or   mise r <task>

[tools]
rust = { version = "stable", components = "rustfmt,clippy", targets = "aarch64-apple-ios,aarch64-linux-android" }
cargo-binstall = "latest"
"cargo:cargo-ndk" = "latest"
"cargo:cargo-deny" = "latest"
"cargo:cargo-nextest" = "latest"
"cargo:cargo-release" = "latest"
node = "25"
pnpm = "10"
java = "temurin-17"
ktlint = "latest"
android-sdk = "latest"

[tasks.build]
description = "Build all crates"
run = "cargo build"

[tasks.check]
description = "Type-check all crates (no codegen)"
run = "cargo check --workspace"

[tasks.lint]
description = "Run clippy on all code"
depends = ["fmt:check"]
run = "cargo clippy --workspace -- -D warnings"

[tasks."lint:fix"]
description = "Run clippy --fix on all code"
depends = ["fmt"]
run = "cargo clippy --workspace --fix"

[tasks.test]
description = "Run all tests"
run = "cargo nextest run --workspace"

[tasks.fmt]
description = "Format all Rust code"
run = "cargo fmt --all"

[tasks."fmt:check"]
description = "Check formatting without modifying files"
run = "cargo fmt --all -- --check"

[tasks.deny]
description = "Check dependencies for license and vulnerability issues"
run = "cargo deny check"

# --- Chat app tasks ---------------------------------------------------

[tasks."chat:dev"]
description = "Run the chat app in desktop dev mode"
run = "cd demos/iroh-ble-chat && pnpm install && pnpm tauri dev"

[tasks."chat:build"]
description = "Build the chat app for desktop"
run = "cd demos/iroh-ble-chat && pnpm install && pnpm tauri build"

[tasks."chat:dev:ios"]
description = "Run the chat app on iOS device"
run = "cd demos/iroh-ble-chat && pnpm install && pnpm tauri ios dev --open"

[tasks."chat:dev:android"]
description = "Run the chat app on Android device"
run = "cd demos/iroh-ble-chat && pnpm install && pnpm tauri android dev --open"


[tasks."chat:deploy:android:all"]
description = "Build debug APK and deploy+launch on all connected Android devices"
dir = "demos/iroh-ble-chat"
file = "scripts/deploy-android-all.sh"

[tasks."chat:deploy:ios:all"]
description = "Build debug iOS app and deploy+launch on all connected iPhones"
dir = "demos/iroh-ble-chat"
file = "scripts/deploy-ios-all.sh"

[tasks."chat:deploy:mobile:all"]
description = "Build and deploy to all connected Android + iOS devices"
depends = ["chat:deploy:android:all", "chat:deploy:ios:all"]

[tasks."chat:uninstall:android:all"]
description = "Uninstall iroh-ble-chat from all connected Android devices"
run = """
DEVICES=$(adb devices 2>/dev/null | grep -w 'device$' | awk '{print $1}')
if [ -z "$DEVICES" ]; then
  echo "No Android devices connected."
  exit 0
fi
COUNT=0
for dev in $DEVICES; do
  echo "==> Uninstalling from $dev..."
  adb -s "$dev" uninstall org.jakebot.iroh_ble_chat || echo "    (not installed)"
  COUNT=$((COUNT + 1))
done
echo "==> Uninstalled from $COUNT Android device(s)."
"""

[tasks."chat:uninstall:ios:all"]
description = "Uninstall iroh-ble-chat from all connected iOS devices"
run = """
DEVICES=$(xcrun devicectl list devices 2>/dev/null | awk '/available/ && !/unavailable|simulator|Simulator/ {for(i=1;i<=NF;i++) if($i ~ /^[0-9A-Fa-f-]{20,}$/) print $i}')
if [ -z "$DEVICES" ]; then
  echo "No iOS devices connected."
  exit 0
fi
COUNT=0
for udid in $DEVICES; do
  echo "==> Uninstalling from $udid..."
  xcrun devicectl device uninstall app --device "$udid" org.jakebot.iroh-ble-chat 2>&1 || echo "    (not installed)"
  COUNT=$((COUNT + 1))
done
echo "==> Uninstalled from $COUNT iOS device(s)."
"""

[tasks."chat:uninstall:mobile:all"]
description = "Uninstall iroh-ble-chat from all connected Android + iOS devices"
depends = ["chat:uninstall:android:all", "chat:uninstall:ios:all"]

[tasks."chat:tui"]
description = "Run the terminal chat UI"
run = "cargo run -p iroh-ble-chat-tui"

# --- CI ---------------------------------------------------------------

[tasks."ci:lint"]
description = "Run clippy on all crates"
run = "cargo clippy --workspace -- -D warnings"

[tasks."ci:check-ios"]
description = "Type-check for iOS"
run = "cargo check --target aarch64-apple-ios -p iroh-ble-transport"

[tasks."ci:check-android"]
description = "Type-check for Android"
run = "cargo ndk -t arm64-v8a check -p iroh-ble-transport"
